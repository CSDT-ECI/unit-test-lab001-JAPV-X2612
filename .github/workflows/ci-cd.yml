# =============================================================================
# CI/CD Pipeline — Yatzy Kata (Python)
# =============================================================================
# Stages:
#   1. build  — Set up Python environment and install dependencies
#   2. test   — Run unit tests and enforce ≥85% coverage threshold
#   3. deploy — Deploy the package to PyPI (on push to main only)
#
# Triggers:
#   - Push to: main
#   - Pull Request targeting: main
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.12"
  MIN_COVERAGE: 85

jobs:

  # ----------------------------------------------------------------------------
  # STAGE 1 · BUILD
  # Install dependencies and verify the package can be imported successfully.
  # ----------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install production dependencies
        run: |
          pip install -e .

      - name: Install development dependencies
        run: |
          pip install pytest pytest-cov pycodestyle

      - name: Cache installed packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ env.PYTHON_VERSION }}-

  # ----------------------------------------------------------------------------
  # STAGE 2 · TEST
  # Run the full unit test suite and enforce the minimum coverage threshold.
  # This stage depends on a successful build.
  # ----------------------------------------------------------------------------
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=yatzy \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ----------------------------------------------------------------------------
  # STAGE 3 · DEPLOY
  # Publish the package to PyPI. Runs only on push to main after tests pass.
  # Requires the PYPI_API_TOKEN secret to be configured in the repository.
  # ----------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://pypi.org/project/yatzy-kata/

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution packages
        run: python -m build

      - name: Verify distribution with twine
        run: twine check dist/*

      - name: Deploy artifact
        run: print("Deploy step — replace with your target platform (AWS, GCP, Docker, etc.)")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true